name: Tests du projet

# A chaque push et pull sur main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
 
  # Test unitaire frontend (Vitest)
  frontend-unit-tests:
    name: Tests front (uni)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Configurer Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marche-et-ramasse/package-lock.json

      - name: Installer les dépendances
        working-directory: marche-et-ramasse
        run: npm ci

      - name: Lancer Vitest
        working-directory: marche-et-ramasse
        run: npx vitest run


  #-----------------------------------
  #Test E2E (Cypress)
  e2e-tests:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs:
      - frontend-unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: metr_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Configurer Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marche-et-ramasse/package-lock.json

      - name: Initialiser la BDD
        run: |
          mysql -h 127.0.0.1 -u root -proot metr_test < back_end_M-R/config/schema.sql

      - name: Installer les dépendances back
        working-directory: back_end_M-R
        run: npm ci

      - name: Démarrer le back
        working-directory: back_end_M-R
        env:
          NODE_ENV: test
          PORT: 3000
          BACK_URL: http://localhost
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: metr_test
          JWT_SECRET: ci-secret-test
        run: |
          npm start > ../backend.log 2>&1 &

      - name: Vérifier que le backend est ok
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/test > /dev/null; then
              echo "Backend OK "
              exit 0
            fi
            sleep 2
          done
          echo "Backend non disponible"
          cat backend.log || true
          exit 1

      - name: Installer dépendances front
        working-directory: marche-et-ramasse
        run: npm ci

      - name: Build du frontend
        working-directory: marche-et-ramasse
        env:
          CI: true
          VITE_API_URL: http://localhost:3000
        run: npm run build

      - name: Lancer les test Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: marche-et-ramasse
          start: npx vite --mode ci --host
          wait-on: http://localhost:5173
          wait-on-timeout: 60
          browser: chrome
        env:
          CI: true
          CYPRESS_BASE_URL: http://localhost:5173
          VITE_API_URL: http://localhost:3000

      - name: Afficher les logs si échec
        if: failure()
        run: cat backend.log || true