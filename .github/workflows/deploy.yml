name: CD – Déploiement VPS OVH

# Déclenché uniquement manuellement depuis l'onglet Actions de GitHub
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur le VPS OVH
    runs-on: ubuntu-latest
    # Pas de condition if: le déclenchement manuel suffit comme intention explicite

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer via SSH sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Aller dans le dossier du projet sur le VPS
            cd /opt/metr

            # Récupérer la dernière version du code
            git pull origin main

            # Reconstruire et redémarrer les conteneurs (sans interruption de service)
            docker compose pull
            docker compose up -d --build --remove-orphans

            # Supprimer les anciennes images inutilisées
            docker image prune -f

            echo "Déploiement terminé avec succès ✓"
